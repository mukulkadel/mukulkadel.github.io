title: Mukul Kadel
email: mukulkadel@gmail.com
description: "Software developer's blog — technology, programming, book reviews, and more."
baseurl: ""
url: "https://mukulkadel.com"
twitter_username: mukul_kadel
github_username: mukulkadel

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: none

highlighter: none

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-paginate-v2

pagination:
  enabled: true
  per_page: 10
  permalink: "/page/:num/"
  title: "Blog — Page :num"
  sort_field: "date"
  sort_reverse: true
  trail:
    before: 2
    after: 2

permalink: "/:slug/"

collections:
  pages:
    output: true
    permalink: "/:slug/"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

author:
  name: Mukul Kadel
  twitter: mukul_kadel

social:
  twitter: "https://x.com/mukul_kadel"
  linkedin: "https://www.linkedin.com/in/mukulkadel/"
  github: "https://github.com/mukulkadel"
  youtube: "https://www.youtube.com/channel/UCEbJa5z6aMnLUdvt_nnvpQA"
  instagram: "https://www.instagram.com/mukulkadel/"

# Google Analytics 4 Measurement ID (e.g. G-XXXXXXXXXX)
google_analytics: "G-ZSXEWJ7XHB"

# Google AdSense publisher ID (e.g. ca-pub-XXXXXXXXXX)
google_adsense_client: "ca-pub-9316498323700538"

exclude:
  - wordpress-dump/
  - wordpress-json-dumper.py
  - convert-wp.py
  - Gemfile
  - Gemfile.lock
  - .github/
  - vendor/
  - .bundle/
  - node_modules/
  - "*.py"
