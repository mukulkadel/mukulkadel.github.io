<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body>
  <div class="reading-progress" role="progressbar" aria-hidden="true"></div>
  {% include header.html %}

  <main class="site-main" id="main-content">
    <div class="container">
      {{ content }}
    </div>
  </main>

  {% include footer.html %}

  <!-- highlight.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/languages/bash.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/languages/go.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/languages/sql.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/languages/nginx.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/languages/python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/languages/yaml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/languages/json.min.js"></script>
  <!-- mermaid.js -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <!-- site JS -->
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>

  <style>
    .copy-btn {
      position: absolute;
      top: 0.6rem;
      right: 0.6rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.3rem 0.4rem;
      cursor: pointer;
      color: var(--text-muted);
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      line-height: 1;
      display: flex;
      align-items: center;
    }
    pre:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { color: var(--accent); }
  </style>
</body>
</html>
